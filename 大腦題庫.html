<style>

*{
  box-sizing:border-box;
}

body{
  font-family:"Microsoft JhengHei", Arial, sans-serif;

  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  color:#334;
  margin-bottom:20px;
  font-size:28px;
}

/* 搜尋區 */
.searchBox{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:10px;
  margin-bottom:20px;
}

.searchBox input{
  width:100%;
  padding:12px 15px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}

/* 卡片 */
#results{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.item{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:transform .2s, box-shadow .2s;
}

.item:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.type{
  font-size:12px;
  color:#888;
  margin-bottom:5px;
}

.name{
  font-weight:bold;
  font-size:16px;
  margin-bottom:6px;
}

.question{
  font-size:14px;
  margin-bottom:8px;
  color:#555;
}

.answer{
  font-size:16px;
  font-weight:bold;
}

.answer[data-value="✅"]{
  color:green;
}

.answer[data-value="❌"]{
  color:red;
}
.tags{
  margin-bottom:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.tags button{
  border:none;
  padding:8px 14px;
  border-radius:20px;
  background:#4a7dff;
  color:white;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}
.tags button:hover{
  background:#2f5ee0;
}
.columns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

#wrong,#correct{
  display:grid;
  gap:12px;
}

h2{
  margin:10px 0;
  font-size:20px;
}
.mapPopup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.mapImage{
  max-width:95%;
  max-height:95%;
  border-radius:10px;
}
.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#333;
  padding:10px;
  display:flex;
  gap:10px;
  z-index:1000;
}

.navbar a{
  color:white;
  text-decoration:none;
  padding:8px 14px;
  background:#555;
  border-radius:6px;
}

.navbar a:hover{
  background:#777;
}

/* 內容往下移避免被蓋住 */

const searchInput = document.getElementById("search");
const typeInput = document.getElementById("typeSearch");
const wrongDiv = document.getElementById("wrong");
const correctDiv = document.getElementById("correct");
function searchQuiz(){

const keyword = searchInput.value.trim();
const typeKeyword = typeInput.value.trim();

wrongDiv.innerHTML="";
correctDiv.innerHTML="";

if(!keyword && !typeKeyword) return;

const filtered = quizData.filter(q=>{

const matchType = !typeKeyword || (q.type && q.type.includes(typeKeyword));
const matchKeyword = !keyword || q.name.includes(keyword) || q.question.includes(keyword);

return matchType && matchKeyword;

});

filtered.forEach(q=>{

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<div class="type">${q.type || ""}</div>
<div class="name">${q.name}</div>
<div class="question">${q.question}</div>
<div class="answer" data-value="${q.answer}">答案：${q.answer}</div>
`;

if(q.answer==="❌"){
  wrongDiv.appendChild(div);
}else{
  correctDiv.appendChild(div);
}
});

}

searchInput.addEventListener("input",searchQuiz);
typeInput.addEventListener("input",searchQuiz);
function setType(type){
  document.getElementById("typeSearch").value = type;
  searchQuiz();
}
function showMap(){
  document.getElementById("mapPopup").style.display="flex";
}

function closeMap(){
  document.getElementById("mapPopup").style.display="none";
