<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<style>
  *{
    box-sizing:border-box;
  }
  body {
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(to right, #f0f4ff, #e6f0ff);
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #334;
    margin-bottom: 20px;
    font-size: 28px;
  }
  #search {
    width: 100%;
    padding: 12px 15px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 20px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
  }
  #results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px;
  }
  .item {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .item:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.15);
  }
  .name {
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 6px;
    color: #222;
  }
  .question {
    font-size: 14px;
    margin-bottom: 8px;
    color: #555;
  }
  .answer {
    font-size: 16px;
    font-weight: bold;
  }
  .answer[data-value="✅"] {
    color: green;
  }
  .answer[data-value="❌"] {
    color: red;
  }
.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#333;
  padding:10px;
  display:flex;
  gap:10px;
  z-index:1000;
}

.navbar a{
  color:white;
  text-decoration:none;
  padding:8px 14px;
  background:#555;
  border-radius:6px;
}

.navbar a:hover{
  background:#777;
}

/* 內容往下移避免被蓋住 */
body{
  padding-top:60px;
}

</style>
</head>

  const searchInput = document.getElementById('search');
  const resultsDiv = document.getElementById('results');
  // 用來提示「已複製內容」
  function showToast(text){
    const toast = document.createElement("div");
    toast.innerText = "已複製: " + text;
    toast.style.position = "fixed";
    toast.style.bottom = "30px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.background = "#333";
    toast.style.color = "#fff";
    toast.style.padding = "10px 20px";
    toast.style.borderRadius = "8px";
    toast.style.fontSize = "14px";
    toast.style.zIndex = "9999";
    document.body.appendChild(toast);

    setTimeout(()=>toast.remove(),1000);
  }
  //複製文字到剪貼簿 (手機也能用)
  function copyText(text){
    const input = document.createElement("input");
    input.value = text;
    document.body.appendChild(input);
    input.select();
    input.setSelectionRange(0, 99999);
    document.execCommand("copy");
    document.body.removeChild(input);
  }
  // 搜尋題目
  function searchQuiz() {

    // 取得搜尋框內容
    const keyword = searchInput.value.trim();

    resultsDiv.innerHTML = '';
    if (!keyword) return;  // 沒輸入就不搜尋
    const filtered = quizData.filter(q =>
      q.name.includes(keyword) || q.question.includes(keyword)
    );
    filtered.forEach(q => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div class="name">${q.name}</div>
        <div class="question">${q.question}</div>
      `;

      // 點整個框複製答案
      div.addEventListener("click", () => {
  	copyText(q.question);
  	showToast(q.question);
      });

      resultsDiv.appendChild(div);
    });
  }


  searchInput.addEventListener('input', searchQuiz);
